services:
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/auth_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key}
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  backend-service:
    build:
      context: ./backend/backend-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/backend_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key}
      - PORT=3001
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ru-central1
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth_db && pg_isready -U user -d backend_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
