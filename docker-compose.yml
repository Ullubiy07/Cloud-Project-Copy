services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - auth-service
      - backend-service

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/auth_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  backend-service:
    build:
      context: ./backend/backend-service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/backend_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ru-central1
      - GIGACHAT_AUTH_KEY=${GIGACHAT_AUTH_KEY}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth_db && pg_isready -U user -d backend_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - auth-service
      - backend-service
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=https://lnkea.ru/n8n/
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
  postgres_data:
  caddy_data:
  caddy_config:
